services:
  # ── Laravel App ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: signet-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    ports:
      - "8888:8000"
      - "5173:5173"
    environment:
      - APP_ENV=production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      hsm:
        condition: service_started
    networks:
      - internal
      - public
    command: php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── HSM Bridge ──
  hsm:
    build:
      context: ./hsm-bridge
      dockerfile: Dockerfile
      network: host
    container_name: signet-hsm
    restart: unless-stopped
    privileged: false
    cap_add:
      - SYS_RAWIO
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    environment:
      - SERIAL_PORT=/dev/ttyUSB0
      - NODE_ENV=production
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/hsm/status"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── PostgreSQL ──
  db:
    image: postgres:18-bookworm
    container_name: signet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db_data:/var/lib/postgresql/data
    # local debugging: uncomment this if you need to connect from host, but be sure to secure it properly (e.g. bind to localhost only, use strong password, etc.)
    # ports:
    #   - "127.0.0.1:5434:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:8-bookworm
    container_name: signet-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

volumes:
  db_data:
  redis_data:
